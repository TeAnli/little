services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: little
      POSTGRES_PASSWORD: ${DB_PASSWORD:-little}
      POSTGRES_DB: little
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ../app/backend
      dockerfile: ../../docker/Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://little:${DB_PASSWORD:-little}@db:5432/little?sslmode=disable
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SITE_TITLE: "Little Blog"
      SITE_URL: "http://localhost"
    depends_on:
      - db

  frontend:
    build:
      context: ../app/frontend
      dockerfile: ../../docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
