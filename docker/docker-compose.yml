services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: little
      POSTGRES_PASSWORD: ${DB_PASSWORD:-little}
      POSTGRES_DB: little
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U little"]
      interval: 3s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ../app/backend
      dockerfile: ../../docker/Dockerfile.server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://little:${DB_PASSWORD:-little}@db:5432/little?sslmode=disable
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SITE_TITLE: "Little Blog"
      SITE_URL: "http://localhost"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../app/frontend
      dockerfile: ../../docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_started

volumes:
  pgdata:
